<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="bootstrap-icons.css">
    <title>iOS 2026 VPN Manager Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --ios-blur: blur(45px) saturate(180%);
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-amber: #FF9F0A;
            --ios-green: #32D74B;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background: radial-gradient(at 0% 0%, #1e1b4b 0%, transparent 55%),
                        radial-gradient(at 100% 0%, #312e81 0%, transparent 55%),
                        radial-gradient(at 50% 100%, #4c1d95 0%, transparent 100%),
                        #020617;
            background-attachment: fixed;
            display: flex; justify-content: center; padding: 10px;
            overflow-x: hidden;
        }

        .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35; filter: blur(70px); }
        .orb { position: absolute; width: 300px; height: 300px; border-radius: 50%; animation: float 18s infinite alternate ease-in-out; }
        .orb:nth-child(1) { background: #5ec8ff; left: 5%; top: 5%; }
        .orb:nth-child(2) { background: #b08cff; right: 5%; top: 5%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 50px); } }

        .container { width: 100%; max-width: 950px; position: relative; z-index: 1; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white; padding: 12px 15px; border-radius: 16px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s;
            text-decoration: none;
        }
        .glass-btn:active { transform: scale(0.96); opacity: 0.8; }
        .full-btn { width: 100%; height: 50px; margin-bottom: 10px; font-size: 16px; }
        .btn-blue { background: var(--ios-blue); border: none; }
        
        input {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.15); 
            color: #FFFFFF; outline: none; margin-bottom: 12px; font-size: 16px;
        }

        .table-responsive {
            width: 100%; overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px; border: 1px solid var(--glass-border); margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 15px; color: #fff; font-size: 11px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box { 
            width: 90%; max-width: 360px; background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 32px; padding: 25px; text-align: center;
        }
        .qr-holder { background: #fff; padding: 10px; border-radius: 15px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body onload="initApp()">

<div class="orbs"><div class="orb"></div><div class="orb"></div></div>

<div class="container">
    <div id="mainPage">
        <div class="glass-panel" style="text-align: center;">
            <h2 style="margin-bottom: 20px;">VPN Manager <span style="font-weight: 800; color: var(--ios-blue);">PRO</span></h2>
            <div style="display: flex; justify-content: space-around; margin-bottom: 30px;">
                <div><span id="statKeys" style="font-size: 35px; font-weight: 800; color: #00e600;">0</span><br><small>KEYS</small></div>
                <div><span id="statUsers" style="font-size: 35px; font-weight: 800; color: #ff0066;">0</span><br><small>LOGS</small></div>
            </div>
            <button onclick="showAdminPage()" class="glass-btn btn-blue full-btn">OPEN ADMIN PANEL</button>
        </div>
    </div>

    <div id="adminPage" style="display:none">
        <div class="glass-panel">
            <button onclick="showMain()" class="glass-btn" style="margin-bottom: 20px;">BACK</button>
            
            <div id="loginBox" style="text-align: center;">
                <h5>ADMIN LOGIN</h5>
                <input type="password" id="adminPass" placeholder="Password">
                <button onclick="login()" class="glass-btn btn-blue full-btn">LOGIN</button>
            </div>

            <div id="adminPanel" style="display:none">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h5 style="margin:0;">KEYS</h5>
                    <button onclick="toggleAddForm()" class="glass-btn btn-blue" style="padding: 8px 15px; font-size: 12px;">+ NEW</button>
                </div>

                <div id="addKeyForm" style="display:none; margin-bottom: 20px;">
                    <input type="text" id="keyName" placeholder="Key Name">
                    <input type="text" id="keyContent" placeholder="Config URL">
                    <input type="number" id="keyLimit" placeholder="Limit">
                    <button onclick="addKey()" class="glass-btn btn-blue full-btn">CREATE</button>
                </div>

                <div id="adminKeysList" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px;"></div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr><th>NO</th><th>DATE</th><th>KEY</th><th>USER</th></tr>
                        </thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()">
    <div id="keyModal" class="modal-box" onclick="event.stopPropagation()">
        <h3 id="modalKeyName" style="color: #00ffff; margin-top: 0;"></h3>
        <div class="qr-holder"><div id="modalQR"></div></div>
        <div style="display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 12px;">
            <div>Limit: <b id="mTotal"></b></div>
            <div>Used: <b id="mUsed"></b></div>
        </div>
        <input type="text" id="deviceInput" placeholder="User Name">
        <input type="number" id="timeInput" placeholder="Duration">
        <button onclick="registerUsage()" class="glass-btn btn-blue full-btn">REGISTER</button>
        <button onclick="triggerFullDelete()" class="glass-btn btn-red" style="background:var(--ios-red); width:100%; border:none; color:white; border-radius:16px; height:45px;">Delete Key</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_PASSWORD = "admin123";
    let keys = JSON.parse(localStorage.getItem("sys_keys")) || [];
    let logs = JSON.parse(localStorage.getItem("sys_logs")) || [];
    let currentKeyId = null;

    function initApp() {
        tg.expand();
        tg.ready();
        updateStats();
    }

    function showAdminPage() { document.getElementById("mainPage").style.display = "none"; document.getElementById("adminPage").style.display = "block"; }
    function showMain() { updateStats(); document.getElementById("adminPage").style.display = "none"; document.getElementById("mainPage").style.display = "block"; }
    function updateStats() { document.getElementById("statKeys").textContent = keys.length; document.getElementById("statUsers").textContent = logs.length; }
    function toggleAddForm() { let f = document.getElementById("addKeyForm"); f.style.display = (f.style.display === "none") ? "block" : "none"; }

    function login() {
        if(document.getElementById("adminPass").value === ADMIN_PASSWORD) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            renderAll();
        } else { alert("Incorrect Password"); }
    }

    function addKey() {
        let n = document.getElementById("keyName"), c = document.getElementById("keyContent"), l = document.getElementById("keyLimit");
        if(!n.value || !c.value || !l.value) return alert("Fill all fields");
        keys.push({ id: Date.now(), name: n.value, content: c.value, limit: parseInt(l.value), used: 0 });
        n.value = ""; c.value = ""; l.value = "";
        saveData(); toggleAddForm();
    }

    function renderAll() {
        const kList = document.getElementById("adminKeysList");
        kList.innerHTML = keys.map(k => `
            <div class="glass-btn" style="border-left: 4px solid #00ff00; font-size:12px;" onclick="openKeyModal(${k.id})">
                ${k.name} (${k.used}/${k.limit})
            </div>
        `).join("");

        document.getElementById("logs-body").innerHTML = logs.map((l, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td>${l.date}</td>
                <td>${l.key}</td>
                <td>${l.device}</td>
            </tr>
        `).join("");
    }

    function openKeyModal(id) {
        currentKeyId = id;
        let k = keys.find(x => x.id === id);
        document.getElementById("modalKeyName").innerText = k.name;
        document.getElementById("mTotal").textContent = k.limit;
        document.getElementById("mUsed").textContent = k.used;
        document.getElementById("modalQR").innerHTML = "";
        new QRCode(document.getElementById("modalQR"), { text: k.content, width: 140, height: 140 });
        document.getElementById("modalOverlay").style.display = "flex";
    }

    function registerUsage() {
        let dev = document.getElementById("deviceInput").value;
        let time = document.getElementById("timeInput").value;
        let k = keys.find(x => x.id === currentKeyId);
        if(!dev) return alert("Enter User Name");
        k.used++;
        logs.push({ date: new Date().toLocaleDateString(), key: k.name, device: dev, time: time });
        saveData(); closeAllModals();
    }

    function triggerFullDelete() {
        if(confirm("Delete this key?")) {
            keys = keys.filter(x => x.id !== currentKeyId);
            saveData(); closeAllModals();
        }
    }

    function closeAllModals() { document.getElementById("modalOverlay").style.display = "none"; }
    function saveData() {
        localStorage.setItem("sys_keys", JSON.stringify(keys));
        localStorage.setItem("sys_logs", JSON.stringify(logs));
        renderAll(); updateStats();
    }
</script>
</body>
</html>
