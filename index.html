<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS VPN Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --ios-blur: blur(45px) saturate(180%);
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-amber: #FF9F0A;
            --ios-green: #32D74B;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background: radial-gradient(at 0% 0%, #1e1b4b 0%, transparent 55%),
                        radial-gradient(at 100% 0%, #312e81 0%, transparent 55%),
                        radial-gradient(at 50% 100%, #4c1d95 0%, transparent 100%),
                        #020617;
            background-attachment: fixed;
            display: flex; justify-content: center; padding: 20px;
        }

        .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35; filter: blur(70px); }
        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; animation: float 18s infinite alternate ease-in-out; }
        .orb:nth-child(1) { background: #5ec8ff; left: 5%; top: 5%; }
        .orb:nth-child(2) { background: #b08cff; right: 5%; top: 5%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 50px); } }

        .container { width: 100%; max-width: 950px; position: relative; z-index: 1; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 25px; margin-bottom: 25px;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white; padding: 12px 20px; border-radius: 16px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .glass-btn:active { transform: scale(0.96); opacity: 0.8; }
        .full-btn { width: 100%; height: 50px; margin-bottom: 10px; font-size: 16px; }
        .btn-blue { background: var(--ios-blue); border: none; }
        .btn-green { background: #34C759; border: none; }
        
		.btn-cyan {
			background: rgba(0, 255, 255, 0.15) !important;
			border: 1px solid rgba(0, 255, 255, 0.5) !important;
			color: #00ffff !important;
			}
		.btn-cyan:hover {
			background: rgba(0, 255, 255, 0.3) !important;
			box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
			}
		
		.btn-pink {
			background: rgba(255, 105, 180, 0.15) !important;
			border: 1px solid rgba(255, 105, 180, 0.5) !important;
			color: #ff69b4 !important;
			}
		.btn-pink:hover {
			background: rgba(255, 105, 180, 0.3) !important;
			box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
			}
			
		.btn-yellow {
			background: rgba(255, 204, 0, 0.15) !important;
			border: 1px solid rgba(255, 204, 0, 0.5) !important;
			color: #ffcc00 !important;
			}
		.btn-yellow:hover {
			background: rgba(255, 204, 0, 0.3) !important;
			box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
			}
		
		.btn-red {
			background: rgba(255, 59, 48, 0.15) !important;
			border: 1px solid rgba(255, 59, 48, 0.5) !important;
			color: #ff3b30 !important;
			}
		.btn-red:hover {
			background: rgba(255, 59, 48, 0.3) !important;
			box-shadow: 0 0 15px rgba(255, 59, 48, 0.3);
			}
		
		.btn-purple {
			background: rgba(175, 82, 222, 0.15) !important;
			border: 1px solid rgba(175, 82, 222, 0.5) !important;
			color: #af52de !important;
			}
		.btn-purple:hover {
			background: rgba(175, 82, 222, 0.3) !important;
			box-shadow: 0 0 15px rgba(175, 82, 222, 0.3);
			}
		
        .btn-red-glossy {
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.8) 0%, rgba(255, 59, 48, 0.4) 100%) !important;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
			}

        input {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.15); 
            color: #FFFFFF; outline: none; margin-bottom: 12px; font-size: 16px;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.65); transition: color 0.3s; }
        input:focus { border-color: var(--ios-blue); background: rgba(255, 255, 255, 0.2); }

        /* Error State Styling */
        .is-invalid { border: 1px solid #ff3b30 !important; background: rgba(255, 59, 48, 0.1) !important;}
        .is-invalid::placeholder { color: #ff3b30 !important; opacity: 1; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }

        .modal-box { 
            width: 90%; max-width: 360px; 
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 32px; padding: 25px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .qr-holder { background: #fff; padding: 12px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }

        .table-responsive {
            width: 100%; overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px; border: 1px solid var(--glass-border); margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 18px 15px; color: #fff; font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--glass-border); }
        td { padding: 16px 15px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
    </style>
</head>
<body onload="updateStats()">

<div class="orbs"><div class="orb"></div><div class="orb"></div></div>

<div class="container">
    <div id="mainPage">
        <div class="glass-panel" style="text-align: center;">
            <h2 style="margin-bottom: 30px;">VPN Manager <span style="font-weight: 800; color: var(--ios-blue);">PRO</span></h2>
            <div style="display: flex; justify-content: space-around; margin-bottom: 40px;">
                <div><span id="statKeys" style="font-size: 45px; font-weight: 800; color: #00e600;">0</span><br><small style="color: #FFFFFF;">KEYS</small></div>
                <div><span id="statUsers" style="font-size: 45px; font-weight: 800; color: #ff0066;">0</span><br><small style="color: #FFFFFF;">LOGS</small></div>
            </div>
            <button onclick="showAdminPage()" class="glass-btn btn-blue full-btn">OPEN ADMIN PANEL</button>
        </div>
    </div>

    <div id="adminPage" style="display:none">
        <div class="glass-panel">
            <button onclick="showMain()" class="glass-btn" style="margin-bottom: 20px;">
				<i class="bi bi-chevron-left btn-icon"></i> BACK
			</button>
            <div id="loginBox" style="max-width: 400px; margin: 0 auto; text-align: center;">
                <h5 style="margin-bottom: 25px; font-size: 18px;">Authentication Required</h5>
                <input type="password" id="adminPass" placeholder="Admin Password" style="text-align: center;">
                <button onclick="login()" class="glass-btn btn-blue full-btn">
					<i class="bi bi-shield-lock-fill" style="margin-right: 8px;"></i> LOGIN
				</button>
            </div>

            <div id="adminPanel" style="display:none">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h5 style="margin:0; letter-spacing: 1px;">INVENTORY</h5>
                    <div>
            <div style="display: flex; gap: 8px; align-items: center;">
    
			<button onclick="exportData()" class="glass-btn btn-pink" style="padding: 8px 15px; font-size: 12px; border-radius: 20px;">
				<i class="bi bi-download" style="margin-right: 6px;"></i> EXP
			</button>

			<button onclick="document.getElementById('importFile').click()" class="glass-btn btn-cyan" style="padding: 8px 15px; font-size: 12px; border-radius: 20px;">
				<i class="bi bi-upload" style="margin-right: 6px;"></i> IMP
			</button>
				<input type="file" id="importFile" accept=".csv" style="display:none" onchange="importData(event)">

			<button onclick="toggleAddForm()" class="btn-blue-solid" style="padding: 10px 20px; font-size: 13px; font-weight: bold; border-radius: 25px; border: none; color: white; background: #007aff;">
				<i class="bi bi-plus-lg" style="margin-right: 8px;"></i> NEW KEY
			</button>
			</div>
                    </div>
                </div>

                <div id="addKeyForm" style="display:none;">
                    <input type="text" id="keyName" placeholder="Key Name">
                    <input type="text" id="keyContent" placeholder="Config URL">
                    <input type="number" id="keyLimit" placeholder="Usage Limit (Numbers Only)">
                    <button onclick="addKey()" class="glass-btn btn-blue full-btn">CREATE KEY</button>
                </div>

                <div id="adminKeysList" style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 35px;"></div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h5 style="margin:0; letter-spacing: 1px;">USAGE LOGS</h5>
                    <input type="text" id="searchBox" placeholder="🔍 Search logs..." onkeyup="searchLogs()" style="width: 200px; margin-bottom: 0; padding: 10px 18px; font-size: 13px; border-radius: 20px; background: rgba(255,255,255,0.1);">
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
								<th style="width: 40px;">NO</th>
                                <th style="text-align: center;">DATE</th>
                                <th style="text-align: center;">TIME</th>
                                <th style="text-align: center;">KEY</th>
                                <th style="text-align: center;">USER</th>
                                <th style="text-align: right;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()">
    
    <div id="keyModal" class="modal-box" onclick="event.stopPropagation()">
        <div style="text-align: center; margin-bottom: 15px; position: relative;">
    <div id="nameDisplayContainer" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
        <h3 id="modalKeyName" style="margin: 0; color: #00ffff; cursor: pointer;" onclick="enableNameEdit()"></h3>
        <i class="bi bi-pencil-square" onclick="enableNameEdit()" style="cursor: pointer; font-size: 18px; color: #ffff00;"></i>
    </div>
    <input type="text" id="editKeyNameInput" style="display: none; width: 80%; margin: 0 auto; text-align: center; font-size: 18px; font-weight: bold; color: #00ffff; background: rgba(255,255,255,0.1); border: 1px solid #ffffff; border-radius: 10px;">
	</div>
        <div class="qr-holder"><div id="modalQR"></div></div>
        
        <div style="background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; font-size: 13px; margin-bottom: 20px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1);">
            <div style="text-align:center;">Limit<br><b id="mTotal" style="color:#00ffff; font-size:16px;"></b></div>
            <div style="text-align:center;">Used<br><b id="mUsed" style="color:#ffff00; font-size:16px;"></b></div>
            <div style="text-align:center;">Left<br><b id="mLeft" style="color:#00ff00; font-size:16px;"></b></div>
        </div>

        <input type="text" id="deviceInput" placeholder="User Name / Device" style="text-align: center;">
        <input type="number" id="timeInput" placeholder="Duration (Numbers Only)" style="text-align: center;">
        <button onclick="registerUsage()" class="glass-btn btn-blue full-btn">REGISTER & SAVE</button>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeAllModals()" class="glass-btn" style="flex:1;">Cancel</button>
            <button onclick="triggerFullDelete()" class="glass-btn btn-red-glossy" style="flex:1;">Delete Key</button>
        </div>
    </div>

    <div id="editModal" class="modal-box" onclick="event.stopPropagation()">
        <h3 style="margin-top:0;">Edit Entry</h3>
        <input type="text" id="editDeviceInput" placeholder="User Name" style="text-align: center;">
        <input type="number" id="editTimeInput" placeholder="Duration (Numbers Only)" style="text-align: center;">
        <div style="display: flex; gap: 10px;">
            <button onclick="closeAllModals()" class="glass-btn" style="flex:1;">Cancel</button>
            <button onclick="saveEditLog()" class="glass-btn btn-blue" style="flex:1;">Update</button>
        </div>
    </div>

    <div id="alertModal" class="modal-box" onclick="event.stopPropagation()">
        <h3 id="alertTitle" style="margin-top:0;">Alert</h3>
        <p id="alertMsg" style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.4;"></p>
        <div style="display: flex; gap: 12px;">
            <button onclick="closeAllModals()" class="glass-btn" style="flex:1;" id="alertCancelBtn">Cancel</button>
            <button id="alertConfirmBtn" class="glass-btn btn-red-glossy" style="flex:1;">Confirm</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";
    let keys = JSON.parse(localStorage.getItem("sys_keys")) || [];
    let logs = JSON.parse(localStorage.getItem("sys_logs")) || [];
    let currentKeyId = null, currentLogIndex = null;

    function showAdminPage() { document.getElementById("mainPage").style.display = "none"; document.getElementById("adminPage").style.display = "block"; }
    function showMain() { updateStats(); document.getElementById("adminPage").style.display = "none"; document.getElementById("mainPage").style.display = "block"; }
    function updateStats() { document.getElementById("statKeys").textContent = keys.length; document.getElementById("statUsers").textContent = logs.length; }
    function toggleAddForm() { 
    let f = document.getElementById("addKeyForm"); 
    if(f.style.display === "none") {
        // Reset inputs and styles when opening
        document.querySelectorAll("#addKeyForm input").forEach(el => {
            el.value = ""; // <--- ဒီစာကြောင်းက ရိုက်ထားတဲ့ စာသားတွေကို ဖျက်ပေးတာပါ
            el.classList.remove("is-invalid");
            
            // Placeholder တွေကို မူလအတိုင်း ပြန်ထားခြင်း
            if(el.id === "keyName") el.placeholder = "Key Name";
            if(el.id === "keyContent") el.placeholder = "Config URL";
            if(el.id === "keyLimit") el.placeholder = "Usage Limit (Numbers Only)";
        });
        f.style.display = "block";
		} else {
        f.style.display = "none";
		}
	}

    function iosAlert(title, msg, onConfirm = null) {
        document.getElementById("alertTitle").textContent = title;
        document.getElementById("alertMsg").textContent = msg;
        const cBtn = document.getElementById("alertConfirmBtn");
        if(onConfirm) {
            cBtn.style.display="block";
            cBtn.onclick= () => { onConfirm(); closeAllModals(); };
            document.getElementById("alertCancelBtn").textContent = "Cancel";
        } else {
            cBtn.style.display="none";
            document.getElementById("alertCancelBtn").textContent = "OK";
        }
        showModal("alertModal");
    }

    function login() {
        if(document.getElementById("adminPass").value === ADMIN_PASSWORD) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            renderAll();
        } else { iosAlert("⚠️ Access Denied ⚠️", "The password is incorrect."); }
    }
    function addKey() {
        let nInput = document.getElementById("keyName");
        let cInput = document.getElementById("keyContent");
        let lInput = document.getElementById("keyLimit");
        let isValid = true;

        if (nInput.value.trim() === "") {
            nInput.classList.add("is-invalid");
            nInput.placeholder = "⚠️ Please Fill Key Name!";
            isValid = false;
        } else {
            nInput.classList.remove("is-invalid");
            nInput.placeholder = "Key Name";
        }

        if (cInput.value.trim() === "") {
            cInput.classList.add("is-invalid");
            cInput.placeholder = "⚠️ Please Fill Key Address!";
            isValid = false;
        } else {
            cInput.classList.remove("is-invalid");
            cInput.placeholder = "Config URL";
        }

        if (lInput.value.trim() === "" || isNaN(lInput.value) || parseInt(lInput.value) <= 0) {
            lInput.value = "";
            lInput.classList.add("is-invalid");
            lInput.placeholder = "⚠️ Please Fill Number Only!";
            isValid = false;
        } else {
            lInput.classList.remove("is-invalid");
            lInput.placeholder = "Usage Limit (Numbers Only)";
        }

        if (!isValid) return;

        keys.push({
            id: Date.now(), 
            name: nInput.value, 
            content: cInput.value, 
            limit: parseInt(lInput.value), 
            used: 0
        });
        
        nInput.value = ""; cInput.value = ""; lInput.value = "";
        saveData(); 
        toggleAddForm();
	}

    function renderAll(search = "") {
        const kList = document.getElementById("adminKeysList");
        kList.innerHTML = ""; 

        keys.forEach(k => {
            let percent = (k.used / k.limit) * 100;
            let indicatorColor = "#00ff00"; 
            if (percent >= 100) indicatorColor = "#666666";
            else if (percent >= 80) indicatorColor = "#ff0000";
            else if (percent >= 50) indicatorColor = "#ffff00";

            let btn = document.createElement("div");
            btn.className = "glass-btn";
            btn.style.borderLeft = `5px solid ${indicatorColor}`;
            btn.style.margin = "4px";
            btn.style.paddingLeft = "15px"; 
            btn.innerHTML = `${k.name} <span style="margin-left:8px; font-size:10px; opacity:0.6; background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:8px;">${k.used}/${k.limit}</span>`;

            if (percent >= 100) {
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
                btn.onclick = () => iosAlert("⚠️ Limit Full ⚠️", "This key is already full of users.");
            } else {
                btn.onclick = () => openKeyModal(k.id);
            }
            kList.appendChild(btn);
        });

        let filtered = logs.filter(l => l.key.toLowerCase().includes(search.toLowerCase()) || l.device.toLowerCase().includes(search.toLowerCase()));

        document.getElementById("logs-body").innerHTML = filtered.map((l, idx) => {
            let displayNo = idx + 1;
            return `<tr style="vertical-align: middle; text-align: center;">
                <td style="font-size: 13px; color: rgba(255,255,255,1.0);">${displayNo}</td>
                <td style="font-size: 13px;">${l.date.split(',')[0]}<br><span style="opacity:0.5; font-size: 10px;">${l.date.split(',')[1]||""}</span></td>
                <td style="vertical-align: middle;">
                    <span style="background: rgba(255, 105, 180, 0.1); color: #ff0066; padding: 3px 10px; border-radius: 6px; font-size: 13px; border: 1px solid rgba(255, 105, 180, 0.5); font-weight: 800;">
                        ${l.time || "-"}
                    </span>
                </td>
                <td><span style="background: rgba(0, 122, 255, 0.1); color: #5ac8fa; padding: 3px 8px; border-radius: 6px; font-size: 13px; border: 1px solid rgba(0,122,255,0.2);">${l.key}</span></td>
                <td style="font-weight:600; color: white;">${l.device}</td>
                <td class="text-end pe-4">
                    <div style="display: flex; gap: 15px; justify-content: flex-end; align-items: center;">
                        <i class="bi bi-pencil-square" onclick="openEditModal(${logs.indexOf(l)})" style="cursor:pointer; color: #ffc107; font-size: 1.2rem;" title="Edit"></i>
                        <i class="bi bi-trash" onclick="confirmDeleteLog(${logs.indexOf(l)})" style="cursor:pointer; color: #ff3b30; font-size: 1.2rem;" title="Delete"></i>
                    </div>
                </td>
            </tr>`;
        }).join("");
    }

    function registerUsage() {
        let devIn = document.getElementById("deviceInput"), timeIn = document.getElementById("timeInput");
        let dev = devIn.value, k = keys.find(x => x.id === currentKeyId);
        
		// User Name စစ်ဆေးခြင်း
        if(!dev || dev.trim() === "") {
            devIn.value = "";
            devIn.classList.add("is-invalid");
            devIn.placeholder = "⚠️ Please Fill User Name!";
            return;
        } else {
            devIn.classList.remove("is-invalid");
            devIn.placeholder = "User Name / Device";
        }

		// Duration စစ်ဆေးခြင်း
		if(!timeIn.value || timeIn.value.trim() === "") {
			timeIn.value = "";
			timeIn.classList.add("is-invalid");
			timeIn.placeholder = "⚠️ Please Fill Duration!";
			return;
		} else {
			timeIn.classList.remove("is-invalid");
			timeIn.placeholder = "Duration (Numbers Only)";
		}

		// Limit ပြည့်မပြည့် စစ်ဆေးခြင်း
        if(k.used >= k.limit) { 
            iosAlert("⚠️ Limit Full ⚠️", "This key is already full of users."); 
            return; 
        }
        
        let now = new Date();
        let dateStr = now.toLocaleDateString('en-GB'); 
        let timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        
        k.used++; 
        logs.push({ date: dateStr + ", " + timeStr, key: k.name, device: dev, time: timeIn.value });
        
        devIn.value = ""; timeIn.value = "";
        saveData(); 
        openKeyModal(currentKeyId); 
        devIn.focus();
    }

	let currentEditingKeyId = null; // ဘယ် Key ကို ပြင်နေလဲဆိုတာ မှတ်ဖို့
	
	function openKeyModal(id) {
    currentKeyId = id; 
    currentEditingKeyId = id; // နာမည်ပြင်ဖို့အတွက်ပါ မှတ်ထားမယ်
    
    let k = keys.find(x => x.id === id);
    if(!k) return;

    // --- ၁။ Form တွေကို Reset လုပ်ခြင်း ---
    let devIn = document.getElementById("deviceInput");
    let timeIn = document.getElementById("timeInput");
    devIn.value = "";
    timeIn.value = "";
    devIn.classList.remove("is-invalid");
    timeIn.classList.remove("is-invalid");
    devIn.placeholder = "User Name / Device";
    timeIn.placeholder = "Duration (Numbers Only)";

    // --- ၂။ UI Update (နာမည် နှင့် စာရင်းများ) ---
    document.getElementById("modalKeyName").innerText = k.name;
    document.getElementById("mTotal").textContent = k.limit;
    document.getElementById("mUsed").textContent = k.used;
    document.getElementById("mLeft").textContent = k.limit - k.used;

    // နာမည်ပြင်တဲ့ Container တွေကို မူလအတိုင်း ပြန်ထားမယ်
    document.getElementById('nameDisplayContainer').style.display = 'flex';
    document.getElementById('editKeyNameInput').style.display = 'none';

    // --- ၃။ QR Code ထုတ်ခြင်း ---
    document.getElementById("modalQR").innerHTML = "";
    new QRCode(document.getElementById("modalQR"), {
        text: k.content, 
        width: 140, 
        height: 140,
        correctLevel: QRCode.CorrectLevel.H
    });

    // --- ၄။ Modal ကို ပြသခြင်း ---
    showModal("keyModal");
	}
	
	// ၂။ နာမည်ကို နှိပ်ရင် Input Box ပြောင်းပေးမယ့် Function
	function enableNameEdit() {
    const h3 = document.getElementById('modalKeyName');
    const container = document.getElementById('nameDisplayContainer');
    const input = document.getElementById('editKeyNameInput');
    
    input.value = h3.innerText;
    container.style.display = 'none';
    input.style.display = 'block';
    input.focus();

    // Enter ခေါက်ရင် သိမ်းမယ်၊ Escape ဆိုရင် ပြန်ဖျက်မယ်
    input.onkeydown = function(e) {
        if (e.key === 'Enter') {
            saveNewKeyName(input.value);
        } else if (e.key === 'Escape') {
            container.style.display = 'flex';
            input.style.display = 'none';
        }
    };
    
    // Input အပြင်ဘက်ကို နှိပ်ရင်လည်း သိမ်းပေးမယ်
    input.onblur = function() {
        saveNewKeyName(input.value);
    };
	}

	// ၃။ နာမည်အသစ်ကို Database (Array) ထဲ သိမ်းမယ့် Function
	function saveNewKeyName(newName) {
    if (!newName.trim()) return;
    
    const keyIndex = keys.findIndex(k => k.id === currentEditingKeyId);
    if (keyIndex !== -1) {
        keys[keyIndex].name = newName; // Array ထဲမှာ နာမည်ပြောင်းပြီ
        
        // UI ပြန်ပြင်မယ်
        document.getElementById('modalKeyName').innerText = newName;
        document.getElementById('nameDisplayContainer').style.display = 'flex';
        document.getElementById('editKeyNameInput').style.display = 'none';
        
        saveData(); // Python/LocalStorage ထဲ သိမ်းမယ်
        renderAll(); // အပြင်က ဇယားကို Update လုပ်မယ်
    }
	}

    function openEditModal(idx) {
        currentLogIndex = idx;
        let dInp = document.getElementById("editDeviceInput");
        let tInp = document.getElementById("editTimeInput");
        
        dInp.classList.remove("is-invalid");
        tInp.classList.remove("is-invalid");
        dInp.placeholder = "User Name";
        tInp.placeholder = "Duration (Numbers Only)";
        dInp.value = logs[idx].device;
        tInp.value = logs[idx].time || "";
        showModal("editModal");
    }

    function saveEditLog() {
    let devInp = document.getElementById("editDeviceInput");
    let timeInp = document.getElementById("editTimeInput");
    let isValid = true;

		// ၁။ User Name ကို စစ်ဆေးခြင်း
		if (devInp.value.trim() === "") {
        devInp.value = "";
        devInp.classList.add("is-invalid");
        devInp.placeholder = "⚠️ Please Fill User Name!";
        isValid = false;
		} else {
        // အချက်အလက်ရှိရင် အနီရောင်ဘောင်ကို ပြန်ဖြုတ်ပေးရန်
        devInp.classList.remove("is-invalid");
        devInp.placeholder = "User Name";
		}
	
		// ၂။ Duration ကို စစ်ဆေးခြင်း
		if (timeInp.value.trim() === "" || isNaN(timeInp.value)) {
        timeInp.value = "";
        timeInp.classList.add("is-invalid");
        timeInp.placeholder = "⚠️ Please Fill Number Only!";
        isValid = false;
		} else {
        // အချက်အလက်ရှိရင် အနီရောင်ဘောင်ကို ပြန်ဖြုတ်ပေးရန်
        timeInp.classList.remove("is-invalid");
        timeInp.placeholder = "Duration (Numbers Only)";
		}

		// ၃။ အားလုံးမှန်ကန်မှသာ သိမ်းဆည်းမည်
		if (isValid) {
        logs[currentLogIndex].device = devInp.value;
        logs[currentLogIndex].time = timeInp.value;
        saveData();
        closeAllModals();
		}
	}

    function confirmDeleteLog(idx) {
        iosAlert("⚠️ Delete Entry ⚠️", "Remove forever?", () => {
            let key = keys.find(k => k.name === logs[idx].key);
            if(key && key.used > 0) key.used--;
            logs.splice(idx, 1);
            saveData();
        });
    }

    function triggerFullDelete() {
        iosAlert("⚠️ Delete Key ⚠️", "Are you sure you're going to delete all the records with this key?", () => {
            let k = keys.find(x => x.id === currentKeyId);
            logs = logs.filter(l => l.key !== k.name);
            keys = keys.filter(x => x.id !== currentKeyId);
            saveData(); closeAllModals();
        });
    }

    function showModal(id) {
        document.getElementById("modalOverlay").style.display = "flex";
        document.querySelectorAll(".modal-box").forEach(m => m.style.display = "none");
        document.getElementById(id).style.display = "block";
    }

    function closeAllModals() { 
        document.getElementById("modalOverlay").style.display = "none";
        // Reset all input states when closing any modal
        document.querySelectorAll('input').forEach(el => {
            el.classList.remove('is-invalid');
            if(el.id === "deviceInput") el.placeholder = "User Name / Device";
            if(el.id === "editDeviceInput") el.placeholder = "User Name";
            if(el.id === "editTimeInput") el.placeholder = "Duration (Numbers Only)";
        });
    }

    function saveData() {
		// ၁။ အရင်အတိုင်း LocalStorage မှာ သိမ်းထားဦးမယ်
		localStorage.setItem("sys_keys", JSON.stringify(keys));
		localStorage.setItem("sys_logs", JSON.stringify(logs));
		// ၂။ Python API ကတစ်ဆင့် Folder ထဲမှာပါ အမြဲတမ်းသိမ်းမယ်
		if (window.pywebview && window.pywebview.api) {
        const allData = {
            keys: keys,
            logs: logs
        };
        window.pywebview.api.save_data(JSON.stringify(allData))
            .then(response => console.log("Data synced to folder"));
		}
		renderAll();
		updateStats();
		}

    function searchLogs() { renderAll(document.getElementById("searchBox").value); }
    
    function exportData() {
    if (logs.length === 0 && keys.length === 0) {
        iosAlert("⚠️ No Data", "ထုတ်ယူရန် ဒေတာမှတ်တမ်း မရှိသေးပါခင်ဗျာ။");
        return;
    }

    // ၁။ User Logs ကို CSV ထုတ်ခြင်း
    let csvLogs = "Date,Time,KeyName,UserDevice\n" + 
        logs.map(l => {
            let parts = l.date.split(", ");
            return `${parts[0]},${parts[1]||""},${l.key},${l.device}`;
        }).join("\n");

    // ၂။ VPN Keys ကို CSV ထုတ်ခြင်း (Backup အတွက်)
    let csvKeys = "KeyName,ConfigURL,Limit,Used\n" + 
        keys.map(k => `${k.name},${k.content},${k.limit},${k.used}`).join("\n");

    // Logs ဖိုင်ကို ဒေါင်းလုဒ်ဆွဲခြင်း
    downloadFile(csvLogs, "vpn_user_logs.csv");

    // ခဏစောင့်ပြီး Keys ဖိုင်ကိုပါ ဒေါင်းလုဒ်ဆွဲခြင်း
    setTimeout(() => {
        downloadFile(csvKeys, "vpn_keys_backup.csv");
        iosAlert("✅ Export Success", "User Logs နှင့် VPN Keys ဖိုင် (၂) ခုလုံးကို ထုတ်ယူပြီးပါပြီ။");
    }, 500);
	}

	// ဖိုင်ဒေါင်းလုဒ်လုပ်ပေးမည့် Helper Function
	function downloadFile(content, fileName) {
    let blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
    let link = document.createElement("a");
    let url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", fileName);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
	}

	function importData(event) {
		let file = event.target.files[0];
		if (!file) return;

		let reader = new FileReader();
		reader.onload = function(e) {
        let content = e.target.result;
        let lines = content.split("\n");
        let addedLogs = 0;
        let addedKeys = 0;
        
        let header = lines[0].toLowerCase();

        for (let i = 1; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            let cols = line.split(",");

            // ၁။ KEY BACKUP ဖိုင် ဖြစ်နေလျှင်
            if (header.includes("configurl") || header.includes("limit")) {
                let kName = cols[0] ? cols[0].trim() : "";
                let kContent = cols[1] ? cols[1].trim() : "";
                let kLimit = cols[2] ? parseInt(cols[2].trim()) : 10;
                let kUsed = cols[3] ? parseInt(cols[3].trim()) : 0;

                let isExactDuplicate = keys.find(k => k.name === kName && k.content === kContent);
                
                if (!isExactDuplicate && kName !== "") {
                    keys.push({ 
                        id: Date.now() + Math.random(), 
                        name: kName, 
                        content: kContent, 
                        limit: kLimit, 
                        used: kUsed 
                    });
                    addedKeys++;
                }
            } 
            // ၂။ USER LOGS ဖိုင် ဖြစ်နေလျှင်
            else if (cols.length >= 4) {
                let dateVal = cols[0].trim() + ", " + cols[1].trim();
                let keyName = cols[2].trim();
                let userName = cols[3].trim();
                let duration = cols[1] ? cols[1].trim() : "-";

                // Log အသစ်ဖြစ်မှ ထည့်မယ် (Duplicate Check)
                let isDuplicate = logs.some(l => l.date === dateVal && l.device === userName && l.key === keyName);
                if (!isDuplicate) {
                    logs.push({ 
                        date: dateVal, 
                        key: keyName, 
                        device: userName, 
                        time: duration 
                    });
                    addedLogs++;
                }
            }
			}
	
			// --- အရေးကြီးဆုံးအပိုင်း- Used Count ကို Log အရေအတွက်အတိုင်း ပြန်ညှိခြင်း ---
			keys.forEach(k => {
            // လက်ရှိ logs array ထဲမှာ ဒီ Key နာမည်နဲ့ ကိုက်ညီတဲ့ Log အရေအတွက်ကိုပဲ ယူမယ်
            let actualUsage = logs.filter(l => l.key === k.name).length;
            k.used = actualUsage; 
			});
        
			// အပြောင်းအလဲရှိလျှင် အကုန် Update လုပ်မယ်
			if (addedLogs > 0 || addedKeys > 0) {
            saveData();    // LocalStorage နှင့် Python File ထဲသိမ်းမယ်
            renderAll();   // ဇယားကို Update လုပ်မယ်
            updateStats(); // အပေါ်က ကိန်းဂဏန်းတွေ Update လုပ်မယ်
            
            let statusMsg = "";
            if (addedKeys > 0) statusMsg += `Keys (${addedKeys}) ခု `;
            if (addedLogs > 0) statusMsg += (statusMsg ? "နှင့် " : "") + `Logs (${addedLogs}) ခု `;
            
            iosAlert("✅ Import Success", statusMsg + "အောင်မြင်စွာ ထည့်သွင်းပြီးပါပြီ။");
			} else {
            iosAlert("⚠️ No New Data", "ထည့်သွင်းရန် ဒေတာအသစ် မတွေ့ပါ။");
			}
        
			event.target.value = ""; 
			};
			reader.readAsText(file);
			}
</script>
